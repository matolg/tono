name: CD Android

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track to upload to"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      rollout:
        description: "Rollout fraction for production (e.g. 0.1 for 10%). Ignored for other tracks."
        required: false
        default: "1.0"

jobs:
  deploy:
    name: Build & Deploy to Google Play
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/tono.keystore

      - name: Build release AAB
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_PATH: ${{ runner.temp }}/tono.keystore
        run: flutter build appbundle --release

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: com.tono.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: ${{ (inputs.track == 'production' && inputs.rollout != '1.0') && 'inProgress' || 'completed' }}
          userFraction: ${{ inputs.rollout || '1.0' }}
