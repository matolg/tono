name: tono
description: "Tono — музыкальные инструменты: тюнер и метроном."
publish_to: 'none'

version: 1.2.1+6

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  shared_preferences: ^2.2.0
  permission_handler: ^12.0.1
  record: ^6.0.0
  pitch_detector_dart: ^0.0.7
  flutter_soloud: ^3.5.3
  intl: ^0.20.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#F5F4F1"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icon/
    - assets/adi-registration.properties
